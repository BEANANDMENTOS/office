<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pixel art monitoring dashboard for AI agents in a work room and lounge."
    />
    <title>Agent Office Monitor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Office monitor summary">
        <div>
          <p class="eyebrow">AI Agent Office</p>
          <h1>Monitor</h1>
        </div>
        <div class="summary" id="summary" aria-label="Agent status totals"></div>
      </header>

      <main class="office-stage" aria-label="Agent office rooms">
        <section class="room-strip" id="rooms" aria-live="polite"></section>
      </main>

      <aside class="roster-panel" aria-label="Agent roster">
        <div class="roster-head">
          <span>Agent Status</span>
          <span id="lastUpdated">Live monitor</span>
        </div>
        <div class="roster-grid" id="roster"></div>
      </aside>
    </div>

    <script src="script.js"></script>
  </body>
</html>
